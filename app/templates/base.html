<!DOCTYPE html>
<html>
<head>
    <title>Billing System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 3px 15px rgba(0,0,0,0.1);
        }

        h1, h2, h3 {
            margin-top: 0;
        }

        .section {
            margin-top: 25px;
        }

        .form-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        input[type="email"],
        input[type="number"],
        select {
            padding: 6px 8px;
            width: 200px;
        }

        button {
            padding: 6px 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }

        button:hover {
            background-color: #2980b9;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 6px;
            text-align: center;
            vertical-align: middle;
            font-size: 13px;
        }

        th {
            background-color: #3498db;
            color: white;
        }

        table input {
            width: 65px;
            padding: 4px;
            box-sizing: border-box;
        }

        td form {
            display: inline-block;
            margin: 0;
        }

        .small-table {
            width: 350px;
            margin-top: 10px auto;
        }

        .small-table th,
        .small-table td {
            padding: 4px;
            font-size: 13px;
        }

        .small-table input {
            width: 60px;
            padding: 3px;
        }

        .success {
            color: green;
            font-weight: bold;
        }

        .error {
            color: red;
            font-weight: bold;
        }

        .aligned-form {
            width: 350px;
        }

        .form-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .form-group label {
            width: 100px;
            font-weight: 500;
        }

        .form-group input {
            width: 200px;
        }

        /* Bootstrap-style horizontal form */
        .bootstrap-form {
            max-width: 500px;
        }

        .bootstrap-form .form-row {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }

        .bootstrap-form label {
            width: 120px;
            font-weight: 600;
            color: #333;
        }

        .bootstrap-form input {
            flex: 1;
            padding: 6px 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .bootstrap-form input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 3px rgba(52, 152, 219, 0.4);
        }

        hr {
            margin: 20px 0;
        }

        a {
            color: #3498db;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
